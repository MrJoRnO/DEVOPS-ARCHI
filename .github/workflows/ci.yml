name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
   
      - name: Get GitHub Runner Public IP
        id: get_ip
        run: |
          # משיכת ה-IP הציבורי של המכונה הנוכחית
          PUBLIC_IP=$(curl -s https://ifconfig.me)
          echo "RUNNER_IP=${PUBLIC_IP}/32" >> $GITHUB_ENV  
 
      - name: Debug IP
        run: echo "The IP being passed to Terraform is $TF_VAR_admin_ip"
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
        
      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve


      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: url-shortener-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

     
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --region eu-central-1 --name url-shortener-secure
          helm upgrade --install staging-app ./helm/url-shortener \
            -f ./helm/url-shortener/values.yaml \
            -f ./helm/url-shortener/values-staging.yaml \
            --set image.repository=194636597980.dkr.ecr.eu-central-1.amazonaws.com/url-shortener-repo \
            --set image.tag=${{ github.sha }} \
            --namespace staging
          kubectl get pods -n staging