name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-lifecycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install flake8 pytest pytest-cov

      # --- Static Code Analysis (Linting) ---
      - name: Run Linting
        run: |
          # Quality Gate
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # --- Unit Tests & Coverage (Quality Gate 1) ---
      - name: Run Unit Tests
        run: |
          # Quality Gate
          export PYTHONPATH=$PYTHONPATH:$(pwd)/app
          pytest app/test_main.py --cov=app --cov-fail-under=80

      # --- (Semantic + SHA) ---
      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INITIAL_VERSION: 1.0.0
          DEFAULT_BUMP: patch
          WITH_V: false
          MAJOR_STRING_TOKEN: "#MAJOR"
          MINOR_STRING_TOKEN: "#MINOR"

      - name: Prepare Tag
        id: vars
        run: |
          SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}-${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.tag_version.outputs.new_tag }}-${SHA}" >> $GITHUB_OUTPUT
          fi

      # --- Build Docker Image ---
      - name: Build Docker Image
        run: docker build -t url-shortener:${{ steps.vars.outputs.tag }} .

      # --- Security Scan (Quality Gate 2) ---
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'url-shortener:${{ steps.vars.outputs.tag }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivy-config: .trivyignore

      # # --- Push to Registry (Main) ---
      # - name: Push Image
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   run: |
      #     echo "Pushing image to registry with tag ${{ steps.vars.outputs.tag }}..."
      #     # docker push my-registry/url-shortener:${{ steps.vars.outputs.tag }}