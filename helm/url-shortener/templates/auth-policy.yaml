apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: require-oauth2
  namespace: istio-system 
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: CUSTOM
  provider:
    name: oauth2-proxy 
  rules:
  - to:
    - operation:
        paths: ["/grafana*", "/grafana/*"] 